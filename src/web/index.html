<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八千代 - Live2D 渲染</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 10px;
      font-size: 12px;
      border-radius: 5px;
      display: none;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="loading" class="loading">🌸 八千代加载中...</div>
  <div id="debug"></div>
  
  <!-- PixiJS -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/animator/live2dcubismanimator.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/rendering/live2dcubismrendering.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/framework/live2dcubismframework.min.js"></script>
  
  <script type="module" src="./renderer.js"></script>
</body>
</html>
