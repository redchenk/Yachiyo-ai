<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月见八千代 - 虚拟主播</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    
    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 20px;
    }
    
    /* Live2D 区域 */
    .live2d-area {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .live2d-header {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .live2d-header h1 {
      font-size: 1.5em;
      background: linear-gradient(90deg, #c471ed, #f64f59);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .live2d-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    #live2dCanvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 12, 41, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(196, 113, 237, 0.3);
      border-top-color: #c471ed;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    /* 控制按钮 */
    .controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
      z-index: 5;
    }
    
    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      cursor: pointer;
      font-size: 1.2em;
      transition: all 0.2s;
    }
    
    .control-btn:hover {
      background: rgba(196, 113, 237, 0.5);
      transform: scale(1.1);
    }
    
    /* 聊天区域 */
    .chat-area {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-header {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-header h2 {
      font-size: 1.2em;
      color: #c471ed;
    }
    
    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85em;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff6b6b;
    }
    
    .status-dot.connected {
      background: #51cf66;
      box-shadow: 0 0 10px #51cf66;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 15px;
      line-height: 1.5;
      animation: messageIn 0.3s ease;
    }
    
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-bottom-right-radius: 5px;
    }
    
    .message.ai {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 5px;
    }
    
    .message .name {
      font-size: 0.8em;
      opacity: 0.7;
      margin-bottom: 5px;
    }
    
    .chat-input {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .input-row input {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: all 0.3s;
    }
    
    .input-row input:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(196, 113, 237, 0.3);
    }
    
    .input-row button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #c471ed 0%, #f64f59 100%);
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .input-row button:hover {
      transform: scale(1.05);
    }
    
    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .quick-btn {
      padding: 6px 14px;
      border: 1px solid rgba(196, 113, 237, 0.5);
      border-radius: 20px;
      background: transparent;
      color: #c471ed;
      font-size: 0.8em;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .quick-btn:hover {
      background: rgba(196, 113, 237, 0.2);
    }
    
    /* 设置面板 */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: rgba(15, 12, 41, 0.98);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      padding: 20px;
      transition: right 0.3s ease;
      overflow-y: auto;
    }
    
    .settings-panel.open {
      right: 0;
    }
    
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .settings-header h2 {
      color: #c471ed;
    }
    
    .close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5em;
      cursor: pointer;
    }
    
    .setting-group {
      margin-bottom: 25px;
    }
    
    .setting-group h3 {
      font-size: 1em;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 15px;
    }
    
    .setting-item {
      margin-bottom: 15px;
    }
    
    .setting-item label {
      display: block;
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }
    
    .setting-item input, .setting-item select {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 0.9em;
    }
    
    .setting-item input:focus {
      outline: none;
      border-color: #c471ed;
    }
    
    .save-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #c471ed 0%, #f64f59 100%);
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      margin-top: 20px;
    }
    
    .save-btn:hover {
      opacity: 0.9;
    }
    
    /* 响应式 */
    @media (max-width: 968px) {
      .container {
        grid-template-columns: 1fr;
        height: auto;
      }
      
      .live2d-area {
        min-height: 400px;
      }
    }
    
    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(196, 113, 237, 0.5);
      border-radius: 4px;
    }
  </style>
  
  <!-- Live2D Cubism SDK -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/animator/live2dcubismanimator.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/rendering/live2dcubismrendering.min.js"></script>
  <script src="https://cubism.live2d.com/sdk-web/framework/live2dcubismframework.min.js"></script>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="container">
    <!-- Live2D 区域 -->
    <div class="live2d-area">
      <div class="live2d-header">
        <h1>🌙 月见八千代</h1>
        <div class="connection-status">
          <div class="status-dot" id="live2dStatus"></div>
          <span id="live2dStatusText">初始化中</span>
        </div>
      </div>
      
      <div class="live2d-canvas">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <div class="loading-text">加载 Live2D 模型中...</div>
        </div>
        
        <canvas id="live2dCanvas"></canvas>
        
        <div class="controls">
          <button class="control-btn" onclick="toggleSettings()" title="设置">⚙️</button>
          <button class="control-btn" onclick="resetModel()" title="重置">🔄</button>
        </div>
      </div>
    </div>
    
    <!-- 聊天区域 -->
    <div class="chat-area">
      <div class="chat-header">
        <h2>💬 对话</h2>
        <div class="connection-status">
          <div class="status-dot" id="apiStatus"></div>
          <span id="apiStatusText">未连接</span>
        </div>
      </div>
      
      <div class="chat-messages" id="chatMessages">
        <div class="message ai">
          <div class="name">月见八千代</div>
          <div>（月光洒落，银发轻扬）欢迎来到"月读"。我是月见八千代，这里的管理员。在这里，你可以做任何梦——而我，会一直守望着你。那么，今天想和我聊些什么呢？</div>
        </div>
      </div>
      
      <div class="chat-input">
        <div class="input-row">
          <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button onclick="sendMessage()">发送</button>
        </div>
        
        <div class="quick-questions">
          <button class="quick-btn" onclick="sendQuick('你幸福吗？')">🌙 你幸福吗？</button>
          <button class="quick-btn" onclick="sendQuick('松饼是什么味道？')">🥞 松饼</button>
          <button class="quick-btn" onclick="sendQuick('你不会孤独吗？')">💫 孤独</button>
          <button class="quick-btn" onclick="sendQuick('八千年是什么感觉？')">⏳ 八千年</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>⚙️ 设置</h2>
      <button class="close-btn" onclick="toggleSettings()">×</button>
    </div>
    
    <div class="setting-group">
      <h3>🤖 AI 配置</h3>
      
      <div class="setting-item">
        <label>API 提供商</label>
        <select id="apiProvider">
          <option value="custom">自定义 (OpenAI 兼容)</option>
          <option value="ollama">Ollama (本地)</option>
          <option value="qwen">通义千问</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>
      
      <div class="setting-item">
        <label>API 地址</label>
        <input type="text" id="apiUrl" placeholder="http://localhost:11434/v1" value="http://localhost:11434/v1">
      </div>
      
      <div class="setting-item">
        <label>API 密钥 (可选)</label>
        <input type="text" id="apiKey" placeholder="sk-...">
      </div>
      
      <div class="setting-item">
        <label>模型名称</label>
        <input type="text" id="modelName" placeholder="qwen2.5:72b" value="qwen2.5:72b">
      </div>
    </div>
    
    <div class="setting-group">
      <h3>🎭 Live2D 配置</h3>
      
      <div class="setting-item">
        <label>模型路径</label>
        <input type="text" id="modelPath" placeholder="./models/yakumo" value="./models/yakumo">
      </div>
      
      <div class="setting-item">
        <label>模型文件</label>
        <input type="text" id="modelFile" placeholder="yakumo.model3.json" value="yakumo.model3.json">
      </div>
    </div>
    
    <button class="save-btn" onclick="saveSettings()">💾 保存设置</button>
    
    <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.85em; color: rgba(255,255,255,0.6);">
      <strong>💡 提示：</strong><br>
      • API 地址填写你的后端服务地址<br>
      • 本地部署可使用 Ollama (http://localhost:11434/v1)<br>
      • Live2D 模型需放置在指定路径
    </div>
  </div>
  
  <script type="module">
    // ==================== 配置管理 ====================
    const defaultConfig = {
      api: {
        provider: 'custom',
        baseUrl: 'http://localhost:11434/v1',
        apiKey: '',
        model: 'qwen2.5:72b'
      },
      live2d: {
        modelPath: './models/yakumo',
        modelFile: 'yakumo.model3.json'
      }
    };
    
    let config = loadConfig();
    
    function loadConfig() {
      const saved = localStorage.getItem('yachiyo_config');
      if (saved) {
        return JSON.parse(saved);
      }
      return JSON.parse(JSON.stringify(defaultConfig));
    }
    
    function saveConfig() {
      localStorage.setItem('yachiyo_config', JSON.stringify(config));
    }
    
    // 导出到全局作用域
    window.saveSettings = function() {
      config.api.provider = document.getElementById('apiProvider').value;
      config.api.baseUrl = document.getElementById('apiUrl').value;
      config.api.apiKey = document.getElementById('apiKey').value;
      config.api.model = document.getElementById('modelName').value;
      config.live2d.modelPath = document.getElementById('modelPath').value;
      config.live2d.modelFile = document.getElementById('modelFile').value;
      
      saveConfig();
      
      alert('✅ 设置已保存！');
      toggleSettings();
      
      // 重新连接 API
      connectAPI();
    };
    
    window.toggleSettings = function() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('open');
      
      if (panel.classList.contains('open')) {
        // 加载当前设置
        document.getElementById('apiProvider').value = config.api.provider;
        document.getElementById('apiUrl').value = config.api.baseUrl;
        document.getElementById('apiKey').value = config.api.apiKey;
        document.getElementById('modelName').value = config.api.model;
        document.getElementById('modelPath').value = config.live2d.modelPath;
        document.getElementById('modelFile').value = config.live2d.modelFile;
      }
    };
    
    window.resetModel = function() {
      location.reload();
    };
    
    // ==================== 星空背景 ====================
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const starCount = 200;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 3 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }
    }
    
    // ==================== API 连接 ====================
    let ws = null;
    
    window.connectAPI = function() {
      const statusDot = document.getElementById('apiStatus');
      const statusText = document.getElementById('apiStatusText');
      
      // 尝试 WebSocket 连接
      const wsUrl = config.api.baseUrl.replace('/v1', '').replace('http', 'ws') + '/ws';
      
      try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          statusDot.classList.add('connected');
          statusText.textContent = '已连接';
          console.log('✅ API 已连接:', wsUrl);
        };
        
        ws.onclose = () => {
          statusDot.classList.remove('connected');
          statusText.textContent = '已断开';
          console.log('❌ API 已断开');
          
          // 3 秒后重连
          setTimeout(connectAPI, 3000);
        };
        
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          handleAPIMessage(data);
        };
        
        ws.onerror = (error) => {
          console.error('API 错误:', error);
        };
      } catch (error) {
        console.error('连接失败:', error);
        statusText.textContent = '连接失败';
      }
    };
    
    function handleAPIMessage(data) {
      const chatMessages = document.getElementById('chatMessages');
      
      switch (data.type) {
        case 'response':
          addMessage(data.text, false);
          break;
        case 'expression':
          updateEmotion(data.expression);
          break;
        case 'audio':
          playAudio(data.path);
          break;
        case 'speaking':
          console.log('说话状态:', data.value);
          break;
      }
    }
    
    window.sendMessage = async function() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      
      if (!text) return;
      
      addMessage(text, true);
      input.value = '';
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'user_input',
          text: text
        }));
      } else {
        // 降级：使用 HTTP API
        await sendHTTPMessage(text);
      }
    };
    
    async function sendHTTPMessage(text) {
      try {
        const response = await fetch(config.api.baseUrl + '/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': config.api.apiKey ? `Bearer ${config.api.apiKey}` : ''
          },
          body: JSON.stringify({
            model: config.api.model,
            messages: [
              {
                role: 'system',
                content: buildSystemPrompt()
              },
              {
                role: 'user',
                content: text
              }
            ],
            temperature: 0.8,
            max_tokens: 500
          })
        });
        
        const data = await response.json();
        const reply = data.choices[0].message.content;
        
        // 解析 JSON 回复
        let parsed;
        try {
          const jsonMatch = reply.match(/\{[\s\S]*\}/);
          parsed = jsonMatch ? JSON.parse(jsonMatch[0]) : { text: reply, emotion: 'neutral' };
        } catch {
          parsed = { text: reply, emotion: 'neutral' };
        }
        
        addMessage(parsed.text, false);
        updateEmotion(parsed.emotion);
        
      } catch (error) {
        console.error('发送失败:', error);
        addMessage('抱歉，我现在无法连接到服务器...', false);
      }
    }
    
    function buildSystemPrompt() {
      return `你是月见八千代，虚拟世界"月读"的管理员，辉夜姬八千年孤独后的未来形态。
      
性格：温柔、通透、带着淡淡的疏离感
常用意象：月光、数据流、松饼、八千年的等待、梦境、守望

请用 JSON 格式回复：
{
  "text": "你的回复（中文）",
  "emotion": "neutral|happy|surprised|thinking|sad|nostalgic"
}`;
    }
    
    window.sendQuick = function(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    };
    
    // ==================== 聊天界面 ====================
    const chatMessages = document.getElementById('chatMessages');
    
    function addMessage(text, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
      
      if (!isUser) {
        const nameDiv = document.createElement('div');
        nameDiv.className = 'name';
        nameDiv.textContent = '月见八千代';
        messageDiv.appendChild(nameDiv);
      }
      
      const contentDiv = document.createElement('div');
      contentDiv.textContent = text;
      messageDiv.appendChild(contentDiv);
      
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function updateEmotion(emotion) {
      const emotionMap = {
        'neutral': '平静',
        'happy': '温柔',
        'surprised': '惊讶',
        'thinking': '思考',
        'sad': '忧伤',
        'nostalgic': '怀念'
      };
      
      document.getElementById('emotionText').textContent = emotionMap[emotion] || emotion;
    }
    
    function playAudio(path) {
      const audio = new Audio(path);
      audio.play();
    }
    
    // ==================== Live2D 渲染（简化版） ====================
    let live2DInitialized = false;
    
    async function initLive2D() {
      const canvas = document.getElementById('live2dCanvas');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const statusText = document.getElementById('live2dStatusText');
      const statusDot = document.getElementById('live2dStatus');
      
      try {
        // 初始化 Cubism SDK
        const option = { logLevel: 0 };
        await Live2DCubismFramework.startUp(option);
        Live2DCubismFramework.initialize();
        
        // 设置 WebGL
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) {
          throw new Error('WebGL 不支持');
        }
        
        // 调整 canvas 尺寸
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
        
        // 尝试加载模型
        await loadLive2DModel(canvas, gl, config.live2d.modelPath, config.live2d.modelFile);
        
        live2DInitialized = true;
        statusDot.style.background = '#51cf66';
        statusText.textContent = '已加载';
        loadingOverlay.style.display = 'none';
        
        console.log('✅ Live2D 初始化完成');
        
      } catch (error) {
        console.error('Live2D 初始化失败:', error);
        statusText.textContent = '加载失败 (使用占位)';
        loadingOverlay.innerHTML = `
          <div style="text-align: center; padding: 20px;">
            <div style="font-size: 80px; margin-bottom: 20px;">🌙</div>
            <div style="color: rgba(255,255,255,0.7);">
              Live2D 模型加载失败<br>
              <small>请检查模型路径配置</small>
            </div>
          </div>
        `;
      }
    }
    
    async function loadLive2DModel(canvas, gl, modelPath, modelFile) {
      // 简化的模型加载逻辑
      // 实际项目中需要完整的 Cubism SDK 集成
      
      console.log('加载模型:', modelPath, modelFile);
      
      // 这里应该加载 .model3.json 文件
      // 由于跨域和资源限制，演示版使用占位
      
      // 渲染循环
      function render() {
        gl.clearColor(0.0, 0.0, 0.0, 0.0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        
        // 实际项目中这里渲染 Live2D 模型
        // 演示版绘制一个简单的渐变
        
        requestAnimationFrame(render);
      }
      
      render();
    }
    
    // ==================== 初始化 ====================
    window.addEventListener('DOMContentLoaded', () => {
      createStars();
      initLive2D();
      connectAPI();
      
      console.log('🌙 月见八千代 已启动');
      console.log('⚙️ 当前配置:', config);
    });
  </script>
